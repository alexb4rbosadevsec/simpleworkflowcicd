name: 🚀 Build & Test Workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  JAVA_VERSION: 17

jobs:
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [17]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: 🔍 Verify Java & Maven Installation
        run: |
          echo "======================================="
          echo "☕ Java Version"
          echo "======================================="
          java -version

          echo ""
          echo "======================================="
          echo "📦 Maven Version"
          echo "======================================="
          mvn -version

      - name: 📦 Build Maven Project
        run: |
          echo "======================================="
          echo "🚀 Starting Maven Build Process..."
          echo "======================================="

          mvn clean install --batch-mode

          echo ""
          echo "======================================="
          echo "✅ Build Finished Successfully!"
          echo "======================================="

      - name: 📂 Show Generated Artifacts
        run: |
          echo "======================================="
          echo "📁 Generated Files Inside /target"
          echo "======================================="
          ls -lah target

      - name: ⬆️ Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-artifact
          path: target/*.jar

  test:
    name: 🧪 Run Tests & Quality Checks
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-app-artifact
          path: target/

      - name: 📂 Verify Downloaded Artifact
        run: |
          echo "======================================="
          echo "📦 Downloaded Artifact"
          echo "======================================="
          ls -lah target

      - name: 🧪 Execute Unit Tests
        run: |
          echo "======================================="
          echo "🚀 Running Maven Tests..."
          echo "======================================="

          mvn test

          echo ""
          echo "======================================="
          echo "✅ All Tests Passed!"
          echo "======================================="

      - name: 🔎 Run Checkstyle Analysis
        run: |
          echo "======================================="
          echo "🔍 Running Checkstyle..."
          echo "======================================="

          mvn checkstyle:checkstyle

          echo ""
          echo "======================================="
          echo "✅ Checkstyle Validation Completed!"
          echo "======================================="

      - name: 📊 Generate JaCoCo Coverage Report
        run: |
          echo "======================================="
          echo "📈 Generating JaCoCo Coverage Report..."
          echo "======================================="

          mvn jacoco:report

          echo ""
          echo "======================================="
          echo "✅ Coverage Report Generated!"
          echo "======================================="

      - name: 📂 Display Coverage Report Files
        run: |
          echo "======================================="
          echo "📁 JaCoCo Report Files"
          echo "======================================="
          ls -lah target/site/jacoco

      - name: ⬆️ Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/site/jacoco
            target/surefire-reports

      - name: 🎉 Workflow Finished
        run: |
          echo "======================================="
          echo "✅ CI/CD WORKFLOW COMPLETED SUCCESSFULLY"
          echo "======================================="
          echo "✔ Build Completed"
          echo "✔ Tests Passed"
          echo "✔ Checkstyle Passed"
          echo "✔ JaCoCo Coverage Generated"
          echo "======================================="