name: 🚀 Build & Test Workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  JAVA_VERSION: 17
  MAVEN_OPTS: -Xmx1024m

jobs:
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [17]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: 🔍 Environment Information
        run: |
          echo "======================================="
          echo "🖥️ RUNNER INFORMATION"
          echo "======================================="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"

          echo ""
          echo "======================================="
          echo "☕ JAVA VERSION"
          echo "======================================="
          java -version

          echo ""
          echo "======================================="
          echo "📦 MAVEN VERSION"
          echo "======================================="
          mvn -version

      - name: 📦 Build Maven Project
        run: |
          echo "======================================="
          echo "🚀 STARTING MAVEN BUILD"
          echo "======================================="

          mvn clean install --batch-mode --no-transfer-progress

          echo ""
          echo "======================================="
          echo "✅ BUILD FINISHED SUCCESSFULLY"
          echo "======================================="

      - name: 📂 Verify Target Directory
        run: |
          echo "======================================="
          echo "📁 TARGET DIRECTORY CONTENT"
          echo "======================================="

          if [ -d "target" ]; then
            ls -lah target
          else
            echo "⚠️ Target directory not found."
          fi

      - name: 📦 Verify Generated JAR Files
        run: |
          echo "======================================="
          echo "🔎 SEARCHING FOR GENERATED JAR FILES"
          echo "======================================="

          JAR_COUNT=$(find target -name "*.jar" | wc -l)

          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "⚠️ No JAR artifacts were generated."
            echo "ℹ️ This repository may only demonstrate GitHub Actions functionality."
            exit 0
          fi

          echo "✅ Found $JAR_COUNT JAR artifact(s):"
          find target -name "*.jar"

      - name: ⬆️ Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-app-artifact
          path: target/*.jar
          if-no-files-found: warn

  test:
    name: 🧪 Run Tests & Quality Checks
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: my-app-artifact
          path: target/

      - name: 📂 Verify Downloaded Artifacts
        run: |
          echo "======================================="
          echo "📦 DOWNLOADED ARTIFACTS"
          echo "======================================="

          if [ -d "target" ]; then
            ls -lah target
          else
            echo "⚠️ No artifacts directory found."
          fi

      - name: 🧪 Execute Unit Tests
        run: |
          echo "======================================="
          echo "🚀 RUNNING UNIT TESTS"
          echo "======================================="

          mvn test --batch-mode --no-transfer-progress || true

          echo ""
          echo "======================================="
          echo "✅ TEST EXECUTION FINISHED"
          echo "======================================="

      - name: 🔎 Run Checkstyle Analysis
        run: |
          echo "======================================="
          echo "🔍 RUNNING CHECKSTYLE"
          echo "======================================="

          mvn checkstyle:checkstyle --batch-mode --no-transfer-progress || true

          echo ""
          echo "======================================="
          echo "✅ CHECKSTYLE FINISHED"
          echo "======================================="

      - name: 📊 Generate JaCoCo Coverage Report
        run: |
          echo "======================================="
          echo "📈 GENERATING JACOCO REPORT"
          echo "======================================="

          mvn jacoco:report --batch-mode --no-transfer-progress || true

          echo ""
          echo "======================================="
          echo "✅ JACOCO REPORT FINISHED"
          echo "======================================="

      - name: 📂 Display Generated Reports
        run: |
          echo "======================================="
          echo "📁 GENERATED REPORT FILES"
          echo "======================================="

          if [ -d "target/site/jacoco" ]; then
            ls -lah target/site/jacoco
          else
            echo "⚠️ JaCoCo report directory not found."
          fi

          echo ""

          if [ -d "target/surefire-reports" ]; then
            echo "======================================="
            echo "🧪 SUREFIRE TEST REPORTS"
            echo "======================================="
            ls -lah target/surefire-reports
          else
            echo "⚠️ Surefire reports not found."
          fi

      - name: ⬆️ Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/site/jacoco
            target/surefire-reports
          if-no-files-found: warn

      - name: 🎉 Workflow Summary
        run: |
          echo "======================================="
          echo "✅ CI/CD WORKFLOW FINISHED"
          echo "======================================="
          echo "✔ Build Stage Completed"
          echo "✔ Tests Executed"
          echo "✔ Checkstyle Executed"
          echo "✔ Coverage Attempted"
          echo "======================================="
          echo "ℹ️ Repository configured as GitHub Actions demo."
          echo "ℹ️ Missing artifacts/reports won't fail workflow."
          echo "======================================="