name: Build WF
on:   
    Push:
        Branches:
          -main

Jobs:
  Build:
    runs-on: ubuntu-latest
  Steps:
    -name: code checkout
    uses: actions/checkout@v4

    -name: Maven build
    run: mvn install

  Testing:
    runs-on: ubuntu-latest
    needs: Build
  Steps:
    -name: code checkout
    uses: actions/checkout@v4

    -name: Run tests on main branch
    run: mvn test

    -name: checkstyles
    run: mvn checkstyles:checkstyles